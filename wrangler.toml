name = "job-search-agent"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Workers AI binding
[ai]
binding = "AI"

# D1 database binding
[[d1_databases]]
binding = "DB"
database_name = "job-search-db"
database_id = "f0d3d5af-9ceb-4d4b-b5c3-713b0d462447"
# Create the database first: npx wrangler d1 create job-search-db
# Or create it via Cloudflare dashboard, then paste the ID above.

# Static assets (frontend dashboard)
# Default behavior: if path matches an asset, serve it; otherwise run the worker.
# /api/* routes don't match any asset, so they hit the worker. /  serves index.html.
[assets]
directory = "./public"
binding = "ASSETS"
not_found_handling = "single-page-application"

[vars]
# Optional job board API keys (add via dashboard as secrets for production):
#   npx wrangler secret put RAPIDAPI_KEY
#   npx wrangler secret put ADZUNA_APP_ID
#   npx wrangler secret put ADZUNA_APP_KEY

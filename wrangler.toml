name = "job-search-agent"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

# CPU time cap: 50s per invocation (paid plan supports this)
[limits]
cpu_ms = 50000

# Workers AI binding
[ai]
binding = "AI"

# D1 database binding
[[d1_databases]]
binding = "DB"
database_name = "job-search-db"
database_id = "f0d3d5af-9ceb-4d4b-b5c3-713b0d462447"

# Cloudflare Workflow for the resume pipeline (durable, auto-retry)
[[workflows]]
name = "resume-pipeline"
binding = "PIPELINE"
class_name = "ResumePipeline"

# Static assets (frontend dashboard)
[assets]
directory = "./public"
binding = "ASSETS"
not_found_handling = "single-page-application"

[vars]
# Self URL for workflow -> worker self-fetch (offloads AI calls to fresh Worker invocations)
SELF_URL = "https://job-search-agent.robbieetorres.workers.dev"

# Optional job board API keys (add via dashboard as secrets):
#   npx wrangler secret put RAPIDAPI_KEY
#   npx wrangler secret put ADZUNA_APP_ID
#   npx wrangler secret put ADZUNA_APP_KEY

# Daily pipeline rerun. Cron expressions are UTC.
# 0 7 * * *  = 3 AM ET standard time / 2 AM ET daylight time
# Adjust for other timezones:
#   3 AM PT standard = "0 11 * * *"
#   3 AM CT standard = "0 9 * * *"
[triggers]
crons = ["0 7 * * *"]
